<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梦幻四季 · 骑士与公主</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Serif SC', 'SimSun', 'STSong', 'Microsoft YaHei', serif;
    overflow: hidden;
    width: 100vw; height: 100vh;
    background: #0a0a2e;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ====== SCREENS ====== */
  .screen {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.2s ease;
    visibility: hidden;
  }
  .screen.active {
    opacity: 1;
    pointer-events: auto;
    visibility: visible;
  }

  /* ====== INTRO ====== */
  #intro {
    background: linear-gradient(135deg, #1a1a3e 0%, #2d1b4e 50%, #0a0a2e 100%);
    flex-direction: column; gap: 20px;
    z-index: 100;
  }
  #intro h1 {
    color: #ffd4f0;
    font-size: clamp(28px, 6vw, 52px);
    text-shadow: 0 0 30px rgba(255,150,200,0.5);
    animation: titleGlow 3s ease-in-out infinite alternate;
  }
  @keyframes titleGlow {
    from { text-shadow: 0 0 20px rgba(255,150,200,0.3); }
    to { text-shadow: 0 0 40px rgba(255,150,200,0.8), 0 0 80px rgba(255,100,180,0.3); }
  }
  #intro p {
    color: #c8b8e8;
    font-size: clamp(14px, 3vw, 20px);
    opacity: 0; animation: fadeInUp 2s ease 1s forwards;
  }
  #intro button {
    margin-top: 20px;
    padding: 14px 48px;
    border: 2px solid #ff9ec6;
    background: transparent;
    color: #ffd4f0;
    font-size: clamp(16px, 3vw, 22px);
    font-family: inherit;
    border-radius: 50px;
    cursor: pointer;
    opacity: 0; animation: fadeInUp 2s ease 2s forwards;
    transition: all 0.3s;
  }
  #intro button:hover {
    background: rgba(255,158,198,0.2);
    box-shadow: 0 0 30px rgba(255,158,198,0.4);
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ====== INTRO STARS ====== */
  .intro-stars { position: absolute; inset: 0; overflow: hidden; }
  .intro-star {
    position: absolute;
    width: 3px; height: 3px;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: 0.2; }
    to { opacity: 1; }
  }

  /* ====== SCENE BACKGROUNDS ====== */
  .scene-bg {
    position: absolute; inset: 0;
    transition: background 2s ease;
  }

  /* Spring - bright sky with clouds */
  #spring .scene-bg {
    background: linear-gradient(180deg, #87CEEB 0%, #B0E0E6 25%, #E0F7FA 45%, #98FB98 70%, #90EE90 100%);
  }

  /* Summer - dark night sky */
  #summer .scene-bg {
    background: linear-gradient(180deg, #050510 0%, #0a0520 25%, #1a1050 50%, #1a3a2a 80%, #0a2a1a 100%);
  }

  /* Autumn - warm sunset colors */
  #autumn .scene-bg {
    background: linear-gradient(180deg, #FF6B35 0%, #FF8C42 15%, #FFA07A 35%, #CD853F 60%, #8B7355 85%, #6B5B3E 100%);
  }

  /* Winter - cold blue-white */
  #winter .scene-bg {
    background: linear-gradient(180deg, #5a7fa5 0%, #7a9ab8 20%, #a8c4dc 45%, #d4e4f0 65%, #e8f0f8 80%, #f5f8fc 100%);
  }

  /* Castle - deep night */
  #castle .scene-bg {
    background: linear-gradient(180deg, #020210 0%, #0a0a2e 30%, #151545 60%, #1a1a3e 100%);
  }

  /* ====== SKY ELEMENTS ====== */
  .sky-elements {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 1;
  }

  /* Sun */
  .sun {
    position: absolute;
    top: 6%; right: 12%;
    width: clamp(45px, 10vw, 80px);
    height: clamp(45px, 10vw, 80px);
    background: radial-gradient(circle, #fff7a0, #ffd700, transparent 70%);
    border-radius: 50%;
    animation: sunPulse 4s ease-in-out infinite;
  }
  @keyframes sunPulse {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.15); opacity: 1; }
  }

  /* Moon */
  .moon {
    position: absolute;
    top: 8%; left: 12%;
    width: clamp(40px, 8vw, 70px);
    height: clamp(40px, 8vw, 70px);
    background: radial-gradient(circle, #fffff0, #fffacd, #f0e68c);
    border-radius: 50%;
    box-shadow: 0 0 40px rgba(255,255,200,0.5), 0 0 80px rgba(255,255,200,0.2);
    animation: moonGlow 5s ease-in-out infinite alternate;
  }
  @keyframes moonGlow {
    from { box-shadow: 0 0 40px rgba(255,255,200,0.4); }
    to { box-shadow: 0 0 60px rgba(255,255,200,0.7), 0 0 100px rgba(255,255,200,0.3); }
  }
  .moon-crater {
    position: absolute;
    background: rgba(200,190,150,0.3);
    border-radius: 50%;
  }

  /* Clouds */
  .cloud {
    position: absolute;
    background: rgba(255,255,255,0.8);
    border-radius: 50px;
    animation: cloudFloat var(--speed, 30s) linear infinite;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: inherit;
    border-radius: 50%;
  }
  @keyframes cloudFloat {
    from { transform: translateX(-150px); }
    to { transform: translateX(calc(100vw + 150px)); }
  }

  /* Stars (summer/castle) */
  .star-field {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  .star-dot {
    position: absolute;
    width: 2px; height: 2px;
    background: #fff;
    border-radius: 50%;
    animation: starTwinkle var(--dur) ease-in-out infinite alternate;
  }
  @keyframes starTwinkle {
    from { opacity: 0.3; transform: scale(1); }
    to { opacity: 1; transform: scale(1.3); }
  }

  /* Aurora (castle) */
  .aurora {
    position: absolute;
    top: 0; left: -10%;
    width: 120%;
    height: 45%;
    background: linear-gradient(180deg,
      transparent 0%,
      rgba(0, 255, 150, 0.08) 20%,
      rgba(0, 200, 255, 0.12) 40%,
      rgba(150, 0, 255, 0.08) 60%,
      rgba(0, 255, 100, 0.05) 80%,
      transparent 100%
    );
    filter: blur(20px);
    animation: auroraWave 8s ease-in-out infinite alternate;
    pointer-events: none;
  }
  @keyframes auroraWave {
    0% { transform: skewX(-5deg) scaleY(1); opacity: 0.6; }
    33% { transform: skewX(3deg) scaleY(1.1); opacity: 0.8; }
    66% { transform: skewX(-2deg) scaleY(0.9); opacity: 0.7; }
    100% { transform: skewX(4deg) scaleY(1.05); opacity: 0.9; }
  }

  /* Shooting stars */
  .shooting-star {
    position: absolute;
    width: 3px;
    height: 3px;
    background: #fff;
    border-radius: 50%;
    animation: shoot var(--shoot-dur, 2s) linear infinite;
    animation-delay: var(--shoot-delay, 0s);
    opacity: 0;
  }
  .shooting-star::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 60px;
    height: 2px;
    background: linear-gradient(to left, rgba(255,255,255,0.8), transparent);
    transform-origin: left center;
    transform: rotate(180deg);
  }
  @keyframes shoot {
    0% { transform: translate(0, 0); opacity: 0; }
    5% { opacity: 1; }
    70% { opacity: 1; }
    100% { transform: translate(var(--shoot-x, -300px), var(--shoot-y, 200px)); opacity: 0; }
  }

  /* ====== GROUND / TERRAIN ====== */
  .terrain {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 35%;
    pointer-events: none;
    z-index: 2;
  }

  /* Ground hills */
  .ground-hill {
    position: absolute;
    border-radius: 50%;
  }

  /* ====== SCENERY ELEMENTS ====== */
  .scenery {
    position: absolute;
    pointer-events: none;
    z-index: 4;
  }

  /* Trees */
  .tree {
    position: absolute;
  }
  .tree-trunk {
    background: #654321;
    border-radius: 4px;
  }
  .tree-top {
    border-radius: 50%;
  }

  /* Flowers */
  .flower {
    position: absolute;
    font-size: clamp(14px, 3vw, 24px);
    animation: flowerSway 3s ease-in-out infinite alternate;
  }
  @keyframes flowerSway {
    from { transform: rotate(-5deg); }
    to { transform: rotate(5deg); }
  }

  /* Grass tufts */
  .grass {
    position: absolute;
    pointer-events: none;
  }

  /* ====== PARTICLE LAYERS ====== */
  .particles {
    position: absolute; inset: 0;
    overflow: hidden; pointer-events: none;
    z-index: 20;
  }
  .particle {
    position: absolute;
    pointer-events: none;
    animation: floatUp var(--dur) ease-out forwards;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(var(--ty)) scale(var(--end)); }
  }

  /* ====== CHARACTERS ====== */
  .characters {
    position: absolute;
    bottom: 20%;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: clamp(15px, 4vw, 50px);
    align-items: flex-end;
    z-index: 10;
  }
  .character {
    transition: transform 0.5s ease;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
  }
  .character:hover { transform: translateY(-5px); }

  /* ====== DIALOGUE BUBBLE ====== */
  .dialogue-bubble {
    position: absolute;
    top: 6%;
    left: 50%;
    transform: translateX(-50%) translateY(-10px);
    background: rgba(255,255,255,0.95);
    border-radius: 20px;
    padding: 12px 22px;
    max-width: min(480px, 82vw);
    text-align: center;
    font-size: clamp(12px, 2.6vw, 16px);
    color: #333;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    opacity: 0;
    transition: opacity 0.5s ease, transform 0.5s ease;
    z-index: 20;
    line-height: 1.6;
    pointer-events: none;
  }
  .dialogue-bubble.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .dialogue-bubble::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-top: 14px solid rgba(255,255,255,0.95);
  }
  .dialogue-speaker {
    font-weight: 700;
    color: #ff6b9d;
    margin-right: 4px;
  }

  /* ====== NARRATION ====== */
  .narration {
    position: absolute;
    bottom: 3%;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    color: #fff;
    padding: 8px 20px;
    border-radius: 30px;
    font-size: clamp(11px, 2.2vw, 14px);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.5s;
    z-index: 20;
    pointer-events: none;
  }
  .narration.show { opacity: 1; }

  /* ====== NAVIGATION ====== */
  .nav-btn {
    position: absolute;
    bottom: 4%;
    padding: 8px 20px;
    border: 2px solid rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    color: #fff;
    font-size: clamp(11px, 2.2vw, 15px);
    font-family: inherit;
    border-radius: 30px;
    cursor: pointer;
    z-index: 30;
    transition: all 0.3s;
  }
  .nav-btn:hover {
    background: rgba(255,255,255,0.25);
    border-color: #fff;
  }
  .nav-prev { right: auto; left: 4%; }
  .nav-next { right: 4%; }

  /* ====== SCENE INDICATOR ====== */
  .scene-dots {
    position: absolute;
    bottom: 0.5%;
    left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 8px;
    z-index: 30;
  }
  .scene-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transition: all 0.3s;
    cursor: pointer;
  }
  .scene-dot.active {
    background: #fff;
    box-shadow: 0 0 10px rgba(255,255,255,0.8);
    transform: scale(1.3);
  }

  /* ====== MUSIC TOGGLE ====== */
  .music-toggle {
    position: absolute;
    top: 10px; right: 10px;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-size: 15px;
    cursor: pointer;
    z-index: 50;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s;
  }
  .music-toggle:hover {
    background: rgba(255,255,255,0.25);
  }

  /* ====== CLICK HINT ====== */
  .click-hint {
    position: absolute;
    bottom: 10%;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.6);
    font-size: clamp(10px, 2.2vw, 13px);
    animation: pulse 2s ease-in-out infinite;
    z-index: 15;
    pointer-events: none;
    white-space: nowrap;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.9; }
  }

  /* ====== RESPONSIVE ====== */
  @media (max-width: 600px) {
    .dialogue-bubble { padding: 8px 14px; max-width: 78vw; font-size: 12px; }
    .characters { gap: 6px; bottom: 16%; }
    .nav-btn { padding: 6px 12px; }
  }
</style>
</head>
<body>

<!-- ====== INTRO SCREEN ====== -->
<div id="intro" class="screen active">
  <div class="intro-stars" id="introStars"></div>
  <h1>🌸 梦幻四季 🌸</h1>
  <p>骑士守护公主的奇幻旅程</p>
  <button onclick="startStory()">开始冒险 ✨</button>
</div>

<!-- ====== SPRING ====== -->
<div id="spring" class="screen">
  <div class="scene-bg"></div>
  <div class="sky-elements" id="springSky">
    <div class="sun"></div>
    <div class="cloud" style="top:12%;width:100px;height:35px;--speed:25s"></div>
    <div class="cloud" style="top:22%;width:80px;height:28px;--speed:35s;animation-delay:-10s"></div>
    <div class="cloud" style="top:8%;width:60px;height:22px;--speed:40s;animation-delay:-20s"></div>
  </div>
  <div class="terrain" id="springTerrain"></div>
  <div class="scenery" id="springScenery"></div>
  <div class="particles" id="springParticles"></div>
  <div class="characters" id="springChars"></div>
  <div class="dialogue-bubble" id="springDialogue"></div>
  <div class="click-hint" id="springHint">✨ 点击屏幕触发特效 ✨</div>
  <div class="narration" id="springNarration"></div>
  <button class="nav-btn nav-next" onclick="nextScene()">下一幕 →</button>
</div>

<!-- ====== SUMMER ====== -->
<div id="summer" class="screen">
  <div class="scene-bg"></div>
  <div class="sky-elements" id="summerSky">
    <div class="moon"></div>
    <div class="star-field" id="summerStars"></div>
  </div>
  <div class="terrain" id="summerTerrain"></div>
  <div class="scenery" id="summerScenery"></div>
  <div class="particles" id="summerParticles"></div>
  <div class="characters" id="summerChars"></div>
  <div class="dialogue-bubble" id="summerDialogue"></div>
  <div class="click-hint" id="summerHint">✨ 点击屏幕触发特效 ✨</div>
  <div class="narration" id="summerNarration"></div>
  <button class="nav-btn nav-next" onclick="nextScene()">下一幕 →</button>
</div>

<!-- ====== AUTUMN ====== -->
<div id="autumn" class="screen">
  <div class="scene-bg"></div>
  <div class="sky-elements" id="autumnSky">
    <div class="cloud" style="top:10%;width:90px;height:30px;background:rgba(255,220,180,0.6);--speed:30s"></div>
  </div>
  <div class="terrain" id="autumnTerrain"></div>
  <div class="scenery" id="autumnScenery"></div>
  <div class="particles" id="autumnParticles"></div>
  <div class="characters" id="autumnChars"></div>
  <div class="dialogue-bubble" id="autumnDialogue"></div>
  <div class="click-hint" id="autumnHint">✨ 点击屏幕触发特效 ✨</div>
  <div class="narration" id="autumnNarration"></div>
  <button class="nav-btn nav-next" onclick="nextScene()">下一幕 →</button>
</div>

<!-- ====== WINTER ====== -->
<div id="winter" class="screen">
  <div class="scene-bg"></div>
  <div class="sky-elements" id="winterSky">
    <div class="cloud" style="top:15%;width:120px;height:40px;background:rgba(255,255,255,0.9);--speed:45s"></div>
    <div class="cloud" style="top:25%;width:80px;height:28px;background:rgba(255,255,255,0.7);--speed:50s;animation-delay:-15s"></div>
  </div>
  <div class="terrain" id="winterTerrain"></div>
  <div class="scenery" id="winterScenery"></div>
  <div class="particles" id="winterParticles"></div>
  <div class="characters" id="winterChars"></div>
  <div class="dialogue-bubble" id="winterDialogue"></div>
  <div class="click-hint" id="winterHint">✨ 点击屏幕触发特效 ✨</div>
  <div class="narration" id="winterNarration"></div>
  <button class="nav-btn nav-next" onclick="nextScene()">下一幕 →</button>
</div>

<!-- ====== CASTLE ====== -->
<div id="castle" class="screen">
  <div class="scene-bg"></div>
  <div class="sky-elements" id="castleSky">
    <div class="star-field" id="castleStars"></div>
    <div class="aurora"></div>
    <div class="shooting-star" style="top:15%;left:70%;--shoot-x:-400px;--shoot-y:250px;--shoot-dur:3s;--shoot-delay:0s"></div>
    <div class="shooting-star" style="top:25%;left:50%;--shoot-x:-350px;--shoot-y:200px;--shoot-dur:2.5s;--shoot-delay:4s"></div>
    <div class="shooting-star" style="top:10%;left:85%;--shoot-x:-300px;--shoot-y:180px;--shoot-dur:3.5s;--shoot-delay:8s"></div>
    <div class="shooting-star" style="top:30%;left:40%;--shoot-x:-450px;--shoot-y:300px;--shoot-dur:2.8s;--shoot-delay:12s"></div>
    <div class="shooting-star" style="top:8%;left:60%;--shoot-x:-380px;--shoot-y:220px;--shoot-dur:3.2s;--shoot-delay:16s"></div>
  </div>
  <div class="terrain" id="castleTerrain"></div>
  <div class="scenery" id="castleScenery">
    <!-- Castle SVG -->
    <svg style="position:absolute;bottom:15%;left:50%;transform:translateX(-50%);width:clamp(180px,45vw,350px);z-index:3" viewBox="0 0 400 450">
      <!-- Main tower -->
      <rect x="130" y="100" width="140" height="350" fill="#3a3a5a" rx="4"/>
      <rect x="140" y="120" width="25" height="35" rx="12" fill="#ffd700" opacity="0.7"/>
      <rect x="188" y="120" width="25" height="35" rx="12" fill="#ffd700" opacity="0.7"/>
      <rect x="140" y="180" width="25" height="35" rx="12" fill="#ffd700" opacity="0.5"/>
      <rect x="188" y="180" width="25" height="35" rx="12" fill="#ffd700" opacity="0.5"/>
      <rect x="140" y="240" width="25" height="35" rx="12" fill="#ffd700" opacity="0.35"/>
      <rect x="188" y="240" width="25" height="35" rx="12" fill="#ffd700" opacity="0.35"/>
      <rect x="140" y="300" width="25" height="35" rx="12" fill="#ffd700" opacity="0.2"/>
      <rect x="188" y="300" width="25" height="35" rx="12" fill="#ffd700" opacity="0.2"/>
      <polygon points="130,100 200,20 270,100" fill="#4a4a6a"/>
      <!-- Left tower -->
      <rect x="40" y="170" width="80" height="280" fill="#3a3a5a" rx="4"/>
      <polygon points="40,170 80,100 120,170" fill="#4a4a6a"/>
      <rect x="55" y="190" width="18" height="28" rx="9" fill="#ffd700" opacity="0.6"/>
      <rect x="85" y="190" width="18" height="28" rx="9" fill="#ffd700" opacity="0.6"/>
      <rect x="55" y="240" width="18" height="28" rx="9" fill="#ffd700" opacity="0.4"/>
      <rect x="85" y="240" width="18" height="28" rx="9" fill="#ffd700" opacity="0.4"/>
      <!-- Right tower -->
      <rect x="280" y="170" width="80" height="280" fill="#3a3a5a" rx="4"/>
      <polygon points="280,170 320,100 360,170" fill="#4a4a6a"/>
      <rect x="295" y="190" width="18" height="28" rx="9" fill="#ffd700" opacity="0.6"/>
      <rect x="325" y="190" width="18" height="28" rx="9" fill="#ffd700" opacity="0.6"/>
      <rect x="295" y="240" width="18" height="28" rx="9" fill="#ffd700" opacity="0.4"/>
      <rect x="325" y="240" width="18" height="28" rx="9" fill="#ffd700" opacity="0.4"/>
      <!-- Gate -->
      <ellipse cx="200" cy="430" rx="30" ry="25" fill="#1a1a3a"/>
      <rect x="170" y="400" width="60" height="55" rx="30" fill="#1a1a3a"/>
      <!-- Flag -->
      <line x1="200" y1="20" x2="200" y2="-10" stroke="#888" stroke-width="2"/>
      <polygon points="200,-10 230,5 200,20" fill="#ff6b9d"/>
      <!-- Steps -->
      <rect x="140" y="440" width="120" height="10" rx="3" fill="#5a5a7a"/>
      <rect x="150" y="450" width="100" height="10" rx="3" fill="#4a4a6a"/>
    </svg>
    <!-- Street lamps -->
    <svg style="position:absolute;bottom:18%;left:28%;width:30px;height:80px;z-index:4" viewBox="0 0 30 80">
      <rect x="13" y="10" width="4" height="70" fill="#555"/>

// ====== STAR FIELD GENERATOR ======
function generateStarField(containerId, count) {
  const container = document.getElementById(containerId);
  if (!container) return;
  let html = '';
  for (let i = 0; i < count; i++) {
    const x = Math.random() * 100;
    const y = Math.random() * 60;
    const size = 1 + Math.random() * 3;
    const dur = 1 + Math.random() * 3;
    const delay = Math.random() * 3;
    html += `<div class="star-dot" style="left:${x}%;top:${y}%;width:${size}px;height:${size}px;--dur:${dur}s;animation-delay:${delay}s;"></div>`;
  }
  container.innerHTML = html;
}

// ====== INIT ======
function init() {
  // Intro stars
  const starsContainer = document.getElementById('introStars');
  for (let i = 0; i < 100; i++) {
    const star = document.createElement('div');
    star.className = 'intro-star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.setProperty('--dur', (1.5 + Math.random() * 3) + 's');
    star.style.animationDelay = Math.random() * 3 + 's';
    star.style.width = star.style.height = (1 + Math.random() * 3) + 'px';
    starsContainer.appendChild(star);
  }

  // Build scenery for each scene
  buildSpringScenery();
  buildSummerScenery();
  buildAutumnScenery();
  buildWinterScenery();
  buildCastleScenery();

  // Generate star fields
  generateStarField('summerStars', 60);
  generateStarField('castleStars', 120);

  // Place characters
  const isMobile = window.innerWidth < 600;
  const charSize = isMobile ? 0.65 : 0.9;
  scenes.forEach(scene => {
    const chars = document.getElementById(scene + 'Chars');
    if (chars) {
      chars.innerHTML = `<span class="character">${createPrincessSVG(charSize)}</span><span class="character">${createKnightSVG(charSize)}</span>`;
    }
    clickCount[scene] = 0;
  });

  // Click handlers
  scenes.forEach(scene => {
    const el = document.getElementById(scene);
    if (el) el.addEventListener('click', handleSceneClick);
  });
}

// ====== START STORY ======
function startStory() {
  showScene(0);
}

// ====== SHOW SCENE ======
function showScene(index) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('intro').classList.remove('active');

  const sceneName = scenes[index];
  document.getElementById(sceneName).classList.add('active');
  currentScene = index;

  document.getElementById('sceneDots').style.display = 'flex';
  document.getElementById('musicToggle').style.display = 'flex';
  document.querySelectorAll('.scene-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === index);
  });

  clickCount[sceneName] = 0;
  document.getElementById(sceneName + 'Particles').innerHTML = '';
  hideDialogue(sceneName);
  document.getElementById(sceneName + 'Hint').style.display = 'block';
  document.getElementById(sceneName + 'Narration').classList.remove('show');

  // Show first dialogue after delay
  setTimeout(() => {
    const data = sceneData[sceneName].clicks[0];
    showDialogue(sceneName, data.dialogue);
    document.getElementById(sceneName + 'Narration').textContent = data.narration;
    document.getElementById(sceneName + 'Narration').classList.add('show');
  }, 1200);

  // Start ambient particles
  startAmbientParticles(sceneName);

  if (musicPlaying && audioCtx) audioCtx.resume();
}

// ====== HANDLE CLICK ======
function handleSceneClick(e) {
  if (currentScene < 0) return;
  const sceneName = scenes[currentScene];
  const data = sceneData[sceneName];
  const count = clickCount[sceneName];
  if (count >= data.clicks.length) return;

  const clickData = data.clicks[count];
  clickCount[sceneName]++;

  spawnParticles(e.clientX, e.clientY, clickData.emoji, clickData.count);
  showDialogue(sceneName, clickData.dialogue);
  document.getElementById(sceneName + 'Narration').textContent = clickData.narration;
  document.getElementById(sceneName + 'Narration').classList.add('show');
  document.getElementById(sceneName + 'Hint').style.display = 'none';
  playClickSound();

  if (clickCount[sceneName] >= data.clicks.length && sceneName !== 'castle') {
    setTimeout(() => nextScene(), 3500);
  }
}

// ====== SPAWN PARTICLES ======
function spawnParticles(x, y, emoji, count) {
  const container = document.createElement('div');
  container.style.cssText = 'position:absolute;inset:0;pointer-events:none;z-index:25;overflow:hidden;';
  document.body.appendChild(container);

  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.textContent = emoji;
    p.style.cssText = `position:absolute;font-size:${16+Math.random()*20}px;left:${x}px;top:${y}px;animation:floatUp ${1+Math.random()*1.5}s ease-out ${i*0.06}s forwards;`;
    const angle = (Math.PI * 2 * i) / count + (Math.random()-0.5)*0.5;
    const dist = 50 + Math.random() * 120;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist - 60;
    p.style.setProperty('--ty', ty+'px');
    p.style.setProperty('--end', (0.3+Math.random()*0.5).toFixed(2));
    container.appendChild(p);
  }
  setTimeout(() => container.remove(), 3500);
}

// ====== AMBIENT PARTICLES ======
function startAmbientParticles(sceneName) {
  if (ambientTimers[sceneName]) clearInterval(ambientTimers[sceneName]);

  const container = document.getElementById(sceneName + 'Particles');
  if (!container) return;

  const types = {
    spring: ['🌸','🌺','🌷','🌼'],
    summer: ['✨','💫','🌟','⭐'],
    autumn: ['🍂','🍁','🍃'],
    winter: ['❄️','❅','✦'],
    castle: ['⭐','🌟','💫','✨']
  };
  const emojis = types[sceneName] || ['✨'];

  ambientTimers[sceneName] = setInterval(() => {
    if (!document.getElementById(sceneName)?.classList.contains('active')) {
      clearInterval(ambientTimers[sceneName]);
      return;
    }
    const p = document.createElement('div');
    p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    p.style.cssText = `position:absolute;font-size:${10+Math.random()*12}px;left:${Math.random()*100}%;top:${50+Math.random()*40}%;animation:floatUp ${3+Math.random()*5}s ease-out forwards;--ty:${-80-Math.random()*200}px;--end:0.2;`;
    container.appendChild(p);
    setTimeout(() => p.remove(), 9000);
  }, 350);
}

// ====== DIALOGUE ======
function showDialogue(sceneName, data) {
  const bubble = document.getElementById(sceneName + 'Dialogue');
  bubble.innerHTML = `<span class="dialogue-speaker">${data.speaker}：</span>${data.text}`;
  bubble.classList.add('show');
  setTimeout(() => bubble.classList.remove('show'), 4500);
}
function hideDialogue(sceneName) {
  const bubble = document.getElementById(sceneName + 'Dialogue');
  if (bubble) bubble.classList.remove('show');
}

// ====== NAVIGATION ======
function nextScene() {
  if (currentScene < scenes.length - 1) showScene(currentScene + 1);
}
function prevScene() {
  if (currentScene > 0) showScene(currentScene - 1);
}
function goToScene(index) { showScene(index); }
function restartStory() {
  document.getElementById('sceneDots').style.display = 'none';
  document.getElementById('musicToggle').style.display = 'none';
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('intro').classList.add('active');
  currentScene = -1;
}

// ====== SOUND ======
function playClickSound() {
  if (!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(600, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.1);
    osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.25);
  } catch(e) {}
}

function toggleMusic() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if (musicPlaying) {
    musicPlaying = false;
    document.getElementById('musicToggle').textContent = '🔇';
    musicNodes.forEach(n => { try { n.stop(); } catch(e){} });
    musicNodes = [];
  } else {
    musicPlaying = true;
    document.getElementById('musicToggle').textContent = '🎵';
    if (audioCtx.state === 'suspended') audioCtx.resume();
    playAmbientMusic();
  }
}

function playAmbientMusic() {
  if (!musicPlaying || !audioCtx) return;
  const notes = [261.63,293.66,329.63,392.00,440.00,523.25];
  const melody = [0,2,4,3,2,0,1,3,5,4,2,0,1,2,4,3];
  let ni = 0;
  function pn() {
    if (!musicPlaying) return;
    const freq = notes[melody[ni % melody.length]];
    ni++;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    osc.type = 'sine';
    osc.frequency.value = freq;
    filter.type = 'lowpass';
    filter.frequency.value = 1200;
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime+0.05);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+1.2);
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime+1.3);
    musicNodes.push(osc);
    if (musicNodes.length > 20) musicNodes.shift();
    setTimeout(pn, 750);
  }
  pn();
  const pad = audioCtx.createOscillator();
  const padGain = audioCtx.createGain();
  const padFilter = audioCtx.createBiquadFilter();
  pad.type = 'sine';
  pad.frequency.value = 130.81;
  padFilter.type = 'lowpass';
  padFilter.frequency.value = 400;
  padGain.gain.value = 0.025;
  pad.connect(padFilter);
  padFilter.connect(padGain);
  padGain.connect(audioCtx.destination);
  pad.start();
  musicNodes.push(pad);
}

// ====== KEYBOARD ======
document.addEventListener('keydown', (e) => {
  if (e.key==='ArrowRight'||e.key===' ') nextScene();
  if (e.key==='ArrowLeft') prevScene();
});

// ====== START ======
init();
</script>
