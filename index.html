<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>尹湘清 · Heart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
    }

    .heart-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Ma Shan Zheng', cursive, sans-serif;
      font-size: clamp(2rem, 6vw, 5rem);
      color: #c060a0;
      text-shadow:
        0 0 10px rgba(200, 100, 160, 0.8),
        0 0 30px rgba(180, 100, 160, 0.5),
        0 0 60px rgba(200, 120, 170, 0.25);
      letter-spacing: 0.15em;
      z-index: 10;
      pointer-events: none;
      white-space: nowrap;
      opacity: 0;
      animation: textFadeIn 3s ease-out 1.5s forwards;
    }

    @keyframes textFadeIn {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    @media (max-width: 600px) {
      .heart-text {
        font-size: clamp(1.5rem, 8vw, 3rem);
        letter-spacing: 0.1em;
      }
    }

    .music-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid rgba(200, 100, 160, 0.5);
      background: rgba(200, 100, 160, 0.1);
      color: #c060a0;
      font-size: 20px;
      cursor: pointer;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      outline: none;
    }

    .music-btn:hover {
      background: rgba(200, 100, 160, 0.18);
      border-color: rgba(200, 100, 160, 0.8);
    }

    .music-btn.playing {
      animation: musicSpin 3s linear infinite;
    }

    @keyframes musicSpin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <canvas id="heartCanvas"></canvas>
  <div class="heart-text">尹湘清</div>
  <audio id="bgMusic" loop preload="auto">
    <source src="marry.mp3" type="audio/mpeg">
  </audio>
  <button class="music-btn" id="musicBtn" title="播放/暂停音乐">♪</button>
  <script>
    const music = document.getElementById('bgMusic');
    const btn = document.getElementById('musicBtn');
    let playing = false;
    btn.addEventListener('click', () => {
      if (playing) {
        music.pause();
        btn.classList.remove('playing');
        btn.textContent = '♪';
      } else {
        music.play();
        btn.classList.add('playing');
        btn.textContent = '♫';
      }
      playing = !playing;
    });
  </script>
  <script src="heart.js"></script>
</body>
</html>
