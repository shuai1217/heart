<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>尹湘清 · Heart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #0a0015 0%, #0d1b3e 35%, #1a0a3c 65%, #0a0015 100%);
    }

    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
    }

    .heart-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Ma Shan Zheng', cursive, sans-serif;
      font-size: clamp(2rem, 6vw, 5rem);
      color: #ffffff;
      text-shadow:
        0 0 10px rgba(255, 255, 255, 0.9),
        0 0 25px rgba(180, 140, 255, 0.7),
        0 0 50px rgba(130, 90, 220, 0.4),
        0 0 80px rgba(100, 60, 180, 0.2);
      letter-spacing: 0.15em;
      z-index: 10;
      pointer-events: none;
      white-space: nowrap;
      opacity: 0;
      animation: textFadeIn 3s ease-out 1.5s forwards;
    }

    @keyframes textFadeIn {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    @media (max-width: 600px) {
      .heart-text {
        font-size: clamp(1.5rem, 8vw, 3rem);
        letter-spacing: 0.1em;
      }
    }
  </style>
</head>
<body>
  <canvas id="heartCanvas"></canvas>
  <div class="heart-text">尹湘清</div>
  <script src="heart.js"></script>
</body>
</html>
