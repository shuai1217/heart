<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>尹湘清 · Heart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
    }

    .heart-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Ma Shan Zheng', cursive, sans-serif;
      font-size: clamp(2rem, 6vw, 5rem);
      color: #c060a0;
      text-shadow:
        0 0 10px rgba(200, 100, 160, 0.8),
        0 0 30px rgba(180, 100, 160, 0.5),
        0 0 60px rgba(200, 120, 170, 0.25);
      letter-spacing: 0.15em;
      z-index: 10;
      pointer-events: none;
      white-space: nowrap;
    }

    .heart-text .char {
      opacity: 0;
      transition: opacity 0.5s ease;
      display: inline-block;
    }

    .heart-text .char.visible {
      opacity: 1;
    }

    /* Phase 2: Text heartbeat animation */
    .heart-text .char.beating {
      animation: textBeat 0.8s ease-in-out infinite;
    }

    .heart-text .char.beating:nth-child(1) { animation-delay: 0s; }
    .heart-text .char.beating:nth-child(2) { animation-delay: 0.15s; }
    .heart-text .char.beating:nth-child(3) { animation-delay: 0.3s; }

    @keyframes textBeat {
      0%, 100% { transform: scale(1); }
      10% { transform: scale(1.08); }
      20% { transform: scale(1); }
      30% { transform: scale(1.05); }
      40% { transform: scale(1); }
    }

    /* Phase 3: Text fade out */
    .heart-text.fade-out {
      transition: opacity 1s ease;
      opacity: 0;
    }

    @media (max-width: 600px) {
      .heart-text {
        font-size: clamp(1.5rem, 8vw, 3rem);
        letter-spacing: 0.1em;
      }
    }

    .music-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid rgba(200, 100, 160, 0.5);
      background: rgba(200, 100, 160, 0.1);
      color: #c060a0;
      font-size: 20px;
      cursor: pointer;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      outline: none;
    }

    .music-btn:hover {
      background: rgba(200, 100, 160, 0.18);
      border-color: rgba(200, 100, 160, 0.8);
    }

    .music-btn.playing {
      animation: musicSpin 3s linear infinite;
    }

    @keyframes musicSpin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <canvas id="heartCanvas"></canvas>
  <div class="heart-text">
    <span class="char">尹</span><span class="char">湘</span><span class="char">清</span>
  </div>
  <audio id="bgMusic" loop preload="auto">
    <source src="marry.mp3" type="audio/mpeg">
  </audio>
  <button class="music-btn" id="musicBtn" title="播放/暂停音乐">♪</button>
  <script>
    const music = document.getElementById('bgMusic');
    const btn = document.getElementById('musicBtn');
    let playing = false;

    // Try autoplay on first interaction
    function tryPlay() {
      music.volume = 0.6;
      music.play().then(() => {
        playing = true;
        btn.classList.add('playing');
        btn.textContent = '♫';
      }).catch(e => {
        console.log('Autoplay blocked, waiting for user interaction');
      });
    }

    // Try on first click anywhere
    document.addEventListener('click', function firstClick() {
      if (!playing) tryPlay();
      document.removeEventListener('click', firstClick);
    }, { once: true });

    document.addEventListener('touchstart', function firstTouch() {
      if (!playing) tryPlay();
      document.removeEventListener('touchstart', firstTouch);
    }, { once: true });

    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (playing) {
        music.pause();
        btn.classList.remove('playing');
        btn.textContent = '♪';
      } else {
        music.play();
        btn.classList.add('playing');
        btn.textContent = '♫';
      }
      playing = !playing;
    });

    // Hide music button if audio file is missing
    music.addEventListener('error', () => {
      btn.style.display = 'none';
    });

    // Phase 1: Typing text effect
    const chars = document.querySelectorAll('.heart-text .char');
    const revealThresholds = [0.3, 0.6, 0.9];
    window.onConvergenceProgress = function(progress) {
      chars.forEach((ch, i) => {
        if (progress >= revealThresholds[i]) {
          ch.classList.add('visible');
        } else {
          ch.classList.remove('visible');
        }
      });
    };

    // Phase 2: Text heartbeat
    window.onPhaseChange = function(phase, colorProgress) {
      if (phase === 1 && colorProgress >= 0.5) {
        // Start heartbeat after color transition halfway
        chars.forEach(ch => ch.classList.add('beating'));
      } else if (phase === 2) {
        // Fade out text for phase 3
        document.querySelector('.heart-text').classList.add('fade-out');
      }
    };
  </script>
  <script src="heart.js"></script>
</body>
</html>
